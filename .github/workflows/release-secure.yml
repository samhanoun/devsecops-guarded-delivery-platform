        run: echo "Placeholder: syft packages image > sbom.spdx.json"

      - name: Sign image
        run: echo "Placeholder: cosign sign --yes ghcr.io/ORG/IMAGE:${GITHUB_SHA}"

      - name: Attest provenance
        run: echo "Placeholder: cosign attest ..."
